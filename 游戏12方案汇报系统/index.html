<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>建筑师成长之路 - 游戏12：方案汇报系统</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">
        <!-- 顶部导航 -->
        <header class="app-header">
            <div class="header-left">
                <div class="game-badge">游戏 12</div>
                <h1 class="game-title">方案汇报系统</h1>
                <span class="phase-tag">Phase 1 核心流程</span>
            </div>
            <div class="header-center">
                <div class="progress-indicator">
                    <span class="current-level">当前关卡: <strong id="currentLevelDisplay">1</strong>/5</span>
                    <div class="level-dots" id="levelDots"></div>
                </div>
            </div>
            <div class="header-right">
                <button class="btn btn-secondary" onclick="app.importGameData()">
                    <span class="icon">📥</span> 导入数据
                </button>
                <button class="btn btn-primary" onclick="app.exportPackage()">
                    <span class="icon">📤</span> 导出材料包
                </button>
            </div>
        </header>

        <!-- 主体内容区 -->
        <main class="main-content">
            <!-- 左侧工具栏 -->
            <aside class="toolbar" id="toolbar">
                <div class="toolbar-section">
                    <h3>功能模块</h3>
                    <nav class="tool-nav">
                        <button class="tool-btn active" data-module="overview" onclick="app.switchModule('overview')">
                            <span class="icon">📋</span>
                            <span>方案整合</span>
                        </button>
                        <button class="tool-btn" data-module="ppt" onclick="app.switchModule('ppt')">
                            <span class="icon">📊</span>
                            <span>PPT生成</span>
                        </button>
                        <button class="tool-btn" data-module="script" onclick="app.switchModule('script')">
                            <span class="icon">📝</span>
                            <span>汇报脚本</span>
                        </button>
                        <button class="tool-btn" data-module="tips" onclick="app.switchModule('tips')">
                            <span class="icon">💡</span>
                            <span>汇报技巧</span>
                        </button>
                        <button class="tool-btn" data-module="qa" onclick="app.switchModule('qa')">
                            <span class="icon">❓</span>
                            <span>Q&A准备</span>
                        </button>
                        <button class="tool-btn" data-module="eval" onclick="app.switchModule('eval')">
                            <span class="icon">📈</span>
                            <span>汇报评估</span>
                        </button>
                        <button class="tool-btn" data-module="tools" onclick="app.switchModule('tools')">
                            <span class="icon">🛠️</span>
                            <span>第三方工具</span>
                        </button>
                    </nav>
                </div>
                <div class="toolbar-section">
                    <h3>关卡选择</h3>
                    <nav class="level-nav" id="levelNav"></nav>
                </div>
                <div class="toolbar-section">
                    <h3>快捷操作</h3>
                    <div class="quick-actions">
                        <button class="action-btn" onclick="app.saveProgress()">
                            <span class="icon">💾</span> 保存进度
                        </button>
                        <button class="action-btn" onclick="app.loadProgress()">
                            <span class="icon">📂</span> 加载进度
                        </button>
                        <button class="action-btn" onclick="app.resetProgress()">
                            <span class="icon">🔄</span> 重置进度
                        </button>
                    </div>
                </div>
            </aside>

            <!-- 中间工作区 -->
            <section class="workspace" id="workspace">
                <!-- 动态内容将在这里渲染 -->
            </section>

            <!-- 右侧信息面板 -->
            <aside class="info-panel" id="infoPanel">
                <div class="panel-section">
                    <h3>📌 当前关卡</h3>
                    <div class="level-info" id="levelInfo"></div>
                </div>
                <div class="panel-section">
                    <h3>🎯 任务说明</h3>
                    <div class="task-list" id="taskList"></div>
                </div>
                <div class="panel-section">
                    <h3>📥 导入数据预览</h3>
                    <div class="data-preview" id="dataPreview">
                        <p class="empty-hint">暂无导入数据</p>
                    </div>
                </div>
                <div class="panel-section">
                    <h3>📤 产出清单</h3>
                    <div class="output-list" id="outputList"></div>
                </div>
            </aside>
        </main>

        <!-- 模态框：导入数据 -->
        <div class="modal" id="importModal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>导入前置游戏数据</h2>
                    <button class="close-btn" onclick="app.closeModal('importModal')">&times;</button>
                </div>
                <div class="modal-body">
                    <p>请选择要导入的游戏数据文件（JSON格式）：</p>
                    <div class="game-sources">
                        <label class="source-item">
                            <input type="checkbox" value="game2" checked> 游戏2 - 平面布局系统
                        </label>
                        <label class="source-item">
                            <input type="checkbox" value="game3" checked> 游戏3 - 体块设计系统
                        </label>
                        <label class="source-item">
                            <input type="checkbox" value="game4" checked> 游戏4 - 立面造型系统
                        </label>
                        <label class="source-item">
                            <input type="checkbox" value="game8" checked> 游戏8 - 构造设计系统
                        </label>
                        <label class="source-item">
                            <input type="checkbox" value="game9" checked> 游戏9 - 碳排放计算系统
                        </label>
                        <label class="source-item">
                            <input type="checkbox" value="game11" checked> 游戏11 - 效果图生成系统
                        </label>
                    </div>
                    <div class="file-upload-area" id="fileUploadArea">
                        <input type="file" id="gameDataFile" accept=".json" multiple style="display:none">
                        <div class="upload-hint">
                            <span class="icon">📁</span>
                            <p>点击或拖拽上传JSON文件</p>
                            <p class="small">支持多个文件</p>
                        </div>
                    </div>
                    <div class="uploaded-files" id="uploadedFiles"></div>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" onclick="app.closeModal('importModal')">取消</button>
                    <button class="btn btn-primary" onclick="app.confirmImport()">确认导入</button>
                </div>
            </div>
        </div>

        <!-- 模态框：导出材料包 -->
        <div class="modal" id="exportModal">
            <div class="modal-content modal-large">
                <div class="modal-header">
                    <h2>导出汇报材料包</h2>
                    <button class="close-btn" onclick="app.closeModal('exportModal')">&times;</button>
                </div>
                <div class="modal-body" id="exportContent">
                    <!-- 动态内容 -->
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" onclick="app.closeModal('exportModal')">关闭</button>
                    <button class="btn btn-primary" onclick="app.downloadPackage()">
                        <span class="icon">⬇️</span> 下载材料包
                    </button>
                </div>
            </div>
        </div>

        <!-- 演示模式浮层 -->
        <div class="presentation-overlay" id="presentationOverlay">
            <div class="presentation-header">
                <div class="presentation-timer">
                    <span id="presentationTime">00:00</span>
                    <span class="target-time">/ 目标: <span id="targetTime">10:00</span></span>
                </div>
                <button class="btn-close" onclick="app.exitPresentation()">&times;</button>
            </div>
            <div class="presentation-content">
                <div class="script-display" id="scriptDisplay"></div>
                <div class="presentation-notes" id="presentationNotes"></div>
            </div>
            <div class="presentation-controls">
                <button class="ctrl-btn" onclick="app.prevScript()">⬆️ 上一段</button>
                <button class="ctrl-btn primary" onclick="app.togglePause()">
                    <span id="pauseIcon">⏸️</span>
                    <span id="pauseText">暂停</span>
                </button>
                <button class="ctrl-btn" onclick="app.nextScript()">⬇️ 下一段</button>
                <div class="progress-bar">
                    <div class="progress-fill" id="scriptProgress"></div>
                </div>
            </div>
        </div>

        <!-- 录音浮层 -->
        <div class="recording-overlay" id="recordingOverlay">
            <div class="recording-header">
                <h3>🗣️ 录音练习</h3>
                <button class="close-btn" onclick="app.stopRecording()">&times;</button>
            </div>
            <div class="recording-body">
                <div class="recording-timer">
                    <span id="recordingTime">00:00</span>
                </div>
                <div class="waveform" id="waveform">
                    <canvas id="waveformCanvas" width="400" height="100"></canvas>
                </div>
                <div class="recording-controls">
                    <button class="rec-btn" id="recordBtn" onclick="app.toggleRecording()">
                        <span id="recordIcon">🎤</span>
                        <span id="recordText">开始录音</span>
                    </button>
                    <button class="rec-btn secondary" id="playBtn" onclick="app.playRecording()" style="display:none">
                        <span>▶️</span> 播放
                    </button>
                    <button class="rec-btn danger" id="deleteRecBtn" onclick="app.deleteRecording()" style="display:none">
                        <span>🗑️</span> 删除
                    </button>
                </div>
                <div class="recording-list" id="recordingList"></div>
            </div>
        </div>

        <!-- 提示消息 -->
        <div class="toast-container" id="toastContainer"></div>
    </div>

    <script src="app.js"></script>
<!-- 飞书数据提交按钮和同步代码 -->
<style>
.feishu-submit-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 99999;
    padding: 12px 20px;
    background: linear-gradient(135deg, #1E6FFF 0%, #3B82F6 100%);
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 500;
    box-shadow: 0 4px 12px rgba(30, 111, 255, 0.3);
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    gap: 8px;
}
.feishu-submit-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 16px rgba(30, 111, 255, 0.4);
}
.feishu-submit-btn:active {
    transform: translateY(0);
}
.feishu-submit-btn.syncing {
    background: linear-gradient(135deg, #10B981 0%, #059669 100%);
    pointer-events: none;
}
.feishu-submit-btn.success {
    background: linear-gradient(135deg, #10B981 0%, #059669 100%);
}
.feishu-submit-btn.error {
    background: linear-gradient(135deg, #EF4444 0%, #DC2626 100%);
}
</style>

<button id="feishuSubmitBtn" class="feishu-submit-btn">
    <span>📤</span>
    <span>提交成绩到飞书</span>
</button>

<script>
// 飞书数据同步模块
(function() {
    const GAME_ID = '游戏12';
    const GAME_NAME = '方案汇报系统';
    
    // 获取学生信息（从妙搭postMessage或localStorage）
    function getStudentInfo() {
        return {
            studentId: localStorage.getItem('feishu_student_id') || '',
            studentName: localStorage.getItem('feishu_student_name') || '',
            className: localStorage.getItem('feishu_class_name') || ''
        };
    }
    
    // 监听来自妙搭的postMessage（身份同步）
    window.addEventListener('message', function(event) {
        if (event.data && event.data.type === 'FEISHU_STUDENT_INFO') {
            localStorage.setItem('feishu_student_id', event.data.studentId);
            localStorage.setItem('feishu_student_name', event.data.studentName);
            localStorage.setItem('feishu_class_name', event.data.className);
            updateButtonState();
        }
    });
    
    // 更新按钮状态
    function updateButtonState() {
        const btn = document.getElementById('feishuSubmitBtn');
        const student = getStudentInfo();
        if (btn) {
            if (!student.studentId) {
                btn.innerHTML = '<span>⚠️</span><span>请先在妙搭填写学生信息</span>';
            } else {
                btn.innerHTML = '<span>📤</span><span>提交成绩到飞书</span>';
            }
        }
    }
    
    // 收集游戏数据（适配不同游戏）
    function collectGameData() {
        const student = getStudentInfo();
        
        // 尝试从全局变量或DOM获取游戏进度
        let currentLevel = 1;
        let levelName = '关卡1';
        let score = 0;
        let completedLevels = [];
        let timeSpent = 0;
        let isCompleted = false;
        
        // 尝试从常见的全局变量获取
        if (typeof currentLevelIndex !== 'undefined') currentLevel = currentLevelIndex + 1;
        if (typeof levelIndex !== 'undefined') currentLevel = levelIndex + 1;
        if (typeof totalScore !== 'undefined') score = totalScore;
        if (typeof gameScore !== 'undefined') score = gameScore;
        if (typeof levelCompleted !== 'undefined') isCompleted = levelCompleted;
        if (typeof unlockedLevels !== 'undefined') completedLevels = unlockedLevels;
        
        // 尝试从DOM读取关卡信息
        const levelTitle = document.querySelector('.level-title, .current-level, h2');
        if (levelTitle) levelName = levelTitle.textContent.trim();
        
        // 记录关键操作数据（简化版）
        const operations = {
            clickCount: window.operationClickCount || 0,
            lastAction: window.lastGameAction || 'unknown'
        };
        
        return {
            studentId: student.studentId,
            studentName: student.studentName,
            className: student.className,
            gameId: GAME_ID,
            gameName: GAME_NAME,
            levelId: currentLevel,
            levelName: levelName,
            isCompleted: isCompleted || currentLevel > 1,
            completedCount: completedLevels.length || 0,
            score: score,
            timeSpent: Math.floor((Date.now() - (window.gameStartTime || Date.now())) / 1000),
            operationData: JSON.stringify(operations),
            submitTime: new Date().toISOString()
        };
    }
    
    // 提交数据到飞书（通过妙搭的桥接）
    async function submitToFeishu() {
        const btn = document.getElementById('feishuSubmitBtn');
        const student = getStudentInfo();
        
        if (!student.studentId) {
            alert('请先在左侧妙搭面板填写你的学号和姓名！');
            return;
        }
        
        // 显示提交中状态
        btn.classList.add('syncing');
        btn.innerHTML = '<span>🔄</span><span>正在同步到飞书...</span>';
        
        try {
            const gameData = collectGameData();
            
            // 通过postMessage发给妙搭处理
            if (window.parent !== window) {
                window.parent.postMessage({
                    type: 'FEISHU_GAME_SUBMIT',
                    data: gameData
                }, '*');
            }
            
            // 模拟成功（实际由妙搭处理）
            setTimeout(() => {
                btn.classList.remove('syncing');
                btn.classList.add('success');
                btn.innerHTML = '<span>✅</span><span>已同步到飞书表格</span>';
                
                setTimeout(() => {
                    btn.classList.remove('success');
                    updateButtonState();
                }, 2000);
            }, 1000);
            
        } catch (error) {
            btn.classList.remove('syncing');
            btn.classList.add('error');
            btn.innerHTML = '<span>❌</span><span>同步失败，请重试</span>';
            
            setTimeout(() => {
                btn.classList.remove('error');
                updateButtonState();
            }, 2000);
        }
    }
    
    // 初始化按钮
    function init() {
        const btn = document.getElementById('feishuSubmitBtn');
        if (btn) {
            btn.addEventListener('click', submitToFeishu);
            updateButtonState();
        }
        
        // 记录游戏开始时间
        window.gameStartTime = Date.now();
    }
    
    // DOM加载完成后初始化
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
    } else {
        init();
    }
})();
</script>

</body>
</html>
